<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
    <title>ArcGIS Feature Layer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Load Leaflet from their CDN -->
    <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.6.4/leaflet.css">
    <!--[if lte IE 8]>
        <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.6.4/leaflet.ie.css" />
    <![endif]-->

    <style>
      html, body, #map {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      path {
        stroke: #008eff;
        stroke-width: 1px;
        fill: rgba(1, 1, 1, 0);
      }

      path:hover {
        fill: #008eff;
      }

    </style>
  <body>

    <div id="map"></div>

    <script src="scripts/leaflet.js"></script>
    <script src="scripts/esri-leaflet.js"></script>

    <script>

      var map = L.map('map').setView([22.5667, 88.3667], 7) ;

      // Add ArcGIS Online Basemap
      L.esri.basemapLayer("DarkGray").addTo(map);

      console.log(window.location.hash) ;

      var url = 'https://services1.arcgis.com/DnZ5orhsUGGdUZ3h/arcgis/rest/services/OZLowRes2/FeatureServer/0' ;

      // high res ozs
      if(window.location.hash == '#hq') {
        url = 'https://services1.arcgis.com/DnZ5orhsUGGdUZ3h/ArcGIS/rest/services/WorldMap1/FeatureServer/2' ;
      }

      L.esri.featureLayer(url, {
        onEachFeature: function(geojson, layer){

          if (geojson.properties) {

            var popupText =  "<div style='overflow-y:scroll; max-height:200px;'>";
            for (prop in geojson.properties) {
              var val = geojson.properties[prop];
              if (val) {
                popupText += "<b>" + prop + "</b>: " + val + "<br>";
              }
            }
            popupText += "</div>";
            layer.bindPopup(popupText);
          }

        }
      }).addTo(map);

      // L.esri.basemapLayer("DarkGrayLabels").addTo(map);

    </script>
  
</body></html>
