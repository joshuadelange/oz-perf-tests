<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=ISO-8859-1">
    <title>ArcGIS Feature Layer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Load Leaflet from their CDN -->
    <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.6.4/leaflet.css">
    <!--[if lte IE 8]>
        <link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.6.4/leaflet.ie.css" />
    <![endif]-->

    <style>

      html, body, #map {
        width: 100%;
        height: 100%;
        margin: 0;

        font-family: "HelveticaNeue-Light", "Helvetica Neue Light", "Helvetica Neue", Helvetica, Arial, "Lucida Grande", sans-serif; 
        font-size: 15px;
        line-height: 24px;

      }

      path {
        stroke: #008eff;
        stroke-width: 1px;
        fill: rgba(1, 1, 1, 0);
      }

      path:hover {
        fill: #008eff;
      }

      #options {
        position: absolute;
          left: 0;
          bottom: 0;

        width: 165px;
        /*height: 100px;*/

        padding: 20px;

        color: #595959;

        background-color: rgba(1, 1, 1, 0.8);
      }

      #options h2 {
        font-weight: 100;
        margin: 0;
        font-size: 20px;
        line-height: 30px;
        color: #B5B5B5;
      }

      #options p {
        margin: 10px 0;
        font-style: italic;
        color: #3b3b3b;
      }

      #options label {
        display: inline-block;
        width: 80%;
      }

      #options input {
        display: inline-block;
        width: 15%;
        background-color: transparent;
        border: 1px solid #595959;
        color: #595959;
      }

    </style>

  <body>

    <div id="map"></div>

    <div id="options">

      <h2>Zoom levels</h2>
      <p>Note: Tweaking these options might crash your browser</p>

      <label for="current_zoom">Current level</label>
      <input id="current_zoom" type="text" disabled="disabled">

      <label for="lq_start_layer">Any OZ's</label>
      <input id="lq_start_layer" type="number">

      <label for="hq_start_layer">HQ OZ's</label>
      <input id="hq_start_layer" type="number">
    </div>

    <script src="bower_components/jquery/jquery.js"></script>
    <script src="scripts/leaflet.js"></script>
    <script src="scripts/esri-leaflet.js"></script>
    <script>

      var optionsController = {

        init: function(){

          this.render() ;

          $('#options input').change(this.submit) ;

        },

        render: function(){
          $('#current_zoom').val(ozController.map.getZoom()) ;
          $('#lq_start_layer').val(ozController.lq_oz_start_at_level) ;
          $('#hq_start_layer').val(ozController.hq_oz_start_at_level) ;
        },

        submit: function(){
          ozController.lq_oz_start_at_level = $('#lq_start_layer').val() ;
          ozController.hq_oz_start_at_level = $('#hq_start_layer').val() ;
          ozController.setAppropiateOzQuality() ;
        }

      } ;

      var ozController = {

        map: null,
        base_layer: null,
        oz_layer: null,

        oz_url_lq: 'https://services1.arcgis.com/DnZ5orhsUGGdUZ3h/arcgis/rest/services/OZLowRes2/FeatureServer/0',
        oz_url_hq: 'https://services1.arcgis.com/DnZ5orhsUGGdUZ3h/ArcGIS/rest/services/WorldMap1/FeatureServer/2',
        oz_url: this.oz_url_lq,

        lq_oz_start_at_level: 5,
        hq_oz_start_at_level: 8,

        init: function(){

          this.map = L.map('map').setView([22.5667, 88.3667], 7),
          this.base_layer = L.esri.basemapLayer('DarkGray').addTo(this.map) ;

          // L.esri.basemapLayer('DarkGrayLabels').addTo(this.map);

          this.map.on('zoomend', $.proxy(this.zoomend, this)) ;

          // this.addOzLayer() ;
          this.setAppropiateOzQuality() ;

        },

        addOzLayer: function(){

          this.oz_layer = L.esri.featureLayer(this.oz_url, {

            onEachFeature: function(geojson, layer){

              if (geojson.properties) {

                var popupText =  "<div>";
                for (prop in geojson.properties) {
                  var val = geojson.properties[prop];
                  if (val) {
                    popupText += "<strong>" + prop + "</strong>: " + val + "<br>";
                  }
                }

                popupText += "</div>";
                layer.bindPopup(popupText);

              }

            }

          }).addTo(this.map);

        },

        removeOzLayer: function(){
          if(this.oz_layer !== null){
            this.map.removeLayer(this.oz_layer) ;
          }
        },

        reloadOzLayer: function(){
          this.removeOzLayer() ;
          this.addOzLayer() ;
        },

        zoomend: function(ev){
          this.setAppropiateOzQuality() ;
          optionsController.render() ;
        },

        setAppropiateOzQuality: function(){

          var z = this.map.getZoom() ;

          if(z >= this.lq_oz_start_at_level
          && z < this.hq_oz_start_at_level) {

            //only if something changes, or else pointless/ugly reload
            if(this.oz_url !== this.oz_url_lq) {
              this.oz_url = this.oz_url_lq ;
              this.reloadOzLayer() ;
            }

          }

          if(z >= this.hq_oz_start_at_level) {

            //only if this is new
            if(this.oz_url !== this.oz_url_hq) {
              this.oz_url = this.oz_url_hq ;
              this.reloadOzLayer() ;            
            }

          }

          //#yolo!
          if(z < this.lq_oz_start_at_level) {
            this.oz_url = null ;
            this.removeOzLayer() ;
          }

        }

      } ;

      ozController.init() ;
      optionsController.init() ;

    </script>
  
</body></html>
