<!DOCTYPE html>
<meta charset="utf-8">
<style>

body {
    margin: 0;
    padding: 0;
    overflow: hidden;
}

.omega_zone {
    fill: white;
    stroke: #777;
    stroke-linejoin: round;
}

.omega_zone:hover {
    fill: gray;
}

</style>
<body>
<script src="http://d3js.org/d3.v3.min.js"></script>
<script src="http://d3js.org/topojson.v1.min.js"></script>
<script>

var width = window.innerWidth,
    height = window.innerHeight,
    svg = d3.select("body")
        .append("svg")
        .attr("width", width)
        .attr("height", height) ;

d3.json("geojson/oz.all.topojson", function(error, oz) {

    console.log(oz, 'loaded');

    var omega_zones = topojson.feature(oz, oz.objects.omega_zones),
        projection = d3.geo.mercator()
            .translate([width / 2, height / 2])
        path = d3.geo.path()
            .projection(projection) ;

        svg.append("path")
            .datum(omega_zones)
            .attr("d", path);

        svg.selectAll(".omega_zones")
            .data(topojson.feature(oz, oz.objects.omega_zones).features)
            .enter().append("path")
            .attr("class", function(d) { return "omega_zone" })
            .attr("d", path);

});

</script>
