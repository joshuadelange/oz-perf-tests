  console.log('loading file') ;

  var width = window.innerWidth, height = window.innerHeight;
  var tile = d3.geo.tile().size([width, height]) ;

  d3.json("data/EuropeMidEast.json", function(error, json) {

    console.log('loaded file') ;

    var projection = d3.geo.mercator();

    var path = d3.geo.path().projection(projection);

    svg = d3.select('body').append('svg')
        .attr('width', width)
        .attr('height', height)
        .call(d3.behavior.zoom()
        .on('zoom', redraw))
        .append('g').attr('transform', 'translate(-62,248)');

    var raster = svg.append("g");

    console.log('svg ready') ;

    svg.append("path")
       .datum(topojson.feature(json, json.objects.omega_zones))
       .attr("d", path);

    svg.selectAll(".omega_zones")
        .data(topojson.feature(json, json.objects.omega_zones).features)
        .enter().append("path")
        .attr("class", function(d) { return "omega_zone" })
        .attr("d", path);

    console.log('gtg!') ;

    // redraw() ;

  });

  function redraw() {

    console.log('redrawing') ;

    var s = d3.event.scale;
    var t = d3.event.translate;
    svg.style("stroke-width", 1 / s).attr("transform", "translate(" + t + ")scale(" + s + ")");

    var tiles = tile
        .scale(s)
        .translate(t)
        ();

    var image = raster
        .attr("transform", "scale(" + tiles.scale + ")translate(" + tiles.translate + ")")
        .selectAll("image")
        .data(tiles, function(d) { return d; });

    image.exit()
        .remove();

    image.enter().append("image")
        .attr("xlink:href", function(d) { return "http://" + ["a", "b", "c", "d"][Math.random() * 4 | 0] + ".tiles.mapbox.com/v3/examples.map-vyofok3q/" + d[2] + "/" + d[0] + "/" + d[1] + ".png"; })
        .attr("width", 1)
        .attr("height", 1)
        .attr("x", function(d) { return d[0]; })
        .attr("y", function(d) { return d[1]; });

  }


</script>
